<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; }
        .card { background: #1a2a33; padding: 25px; border-radius: 20px; max-width: 650px; margin: auto; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h3 { color: #ffd700; margin-bottom: 20px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #ffd70033; padding-bottom: 10px; }
        
        .section-label { font-size: 13px; color: #ffd700; margin: 15px 0 8px; font-weight: 600; }
        .grid-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .choice-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 12px; color: #aaa;
        }
        .choice-btn.active { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); color: #ffd700; font-weight: 600; }

        /* Majburiy tugmalari uchun maxsus rang */
        .choice-btn.mandatory-btn.active { border-color: #00d2ff; background: rgba(0, 210, 255, 0.15); color: #00d2ff; }

        .admin-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin-bottom: 10px; outline: none; }
        .btn-gold { width: 100%; padding: 15px; background: #ffd700; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 12px 25px; border-radius: 50px; transition: 0.5s; font-weight: bold; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Savol Yuklash</h3>

        <div class="section-label">1. Test turini tanlang:</div>
        <div class="grid-select">
            <div class="choice-btn active" id="type-free" onclick="setType('free')">🎁 Bepul (Mutaxassislik)</div>
            <div class="choice-btn" id="type-premium" onclick="setType('premium')">💎 Premium (Mutaxassislik)</div>
            <div class="choice-btn mandatory-btn" id="type-free_mandatory" onclick="setType('free_mandatory')">📌 Bepul uchun Majburiy</div>
            <div class="choice-btn mandatory-btn" id="type-premium_mandatory" onclick="setType('premium_mandatory')">🔥 Premium uchun Majburiy</div>
        </div>

        <div class="section-label">2. Fanni tanlang:</div>
        <div class="grid-select" id="subject-container"></div>

        <div class="section-label">3. Savol:</div>
        <textarea id="m-q" class="admin-input" rows="3" placeholder="Savol matni..."></textarea>
        
        <div class="grid-select">
            <input type="text" id="m-a" class="admin-input" placeholder="A variant">
            <input type="text" id="m-b" class="admin-input" placeholder="B variant">
            <input type="text" id="m-c" class="admin-input" placeholder="C variant">
            <input type="text" id="m-d" class="admin-input" placeholder="D variant">
        </div>

        <select id="m-cor" class="admin-input">
            <option value="A">A variant</option><option value="B">B variant</option>
            <option value="C">C variant</option><option value="D">D variant</option>
        </select>

        <button class="btn-gold" onclick="saveData()">BAZAGA SAQLASH</button>
    </div>

    <div id="toast">Saqlandi!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentType = 'free';
        let currentSub = 'Matematika';

        const allSubs = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya", "Fizika"];
        const mandatorySubs = ["Matematika", "Ona tili", "Tarix"];

        window.renderSubs = () => {
            const container = document.getElementById('subject-container');
            container.innerHTML = "";
            // Agar tur majburiy bo'lsa, faqat 3ta fanni chiqaradi
            const list = (currentType.includes('mandatory')) ? mandatorySubs : allSubs;
            
            list.forEach(s => {
                const btn = document.createElement('div');
                btn.className = `choice-btn ${s === currentSub ? 'active' : ''}`;
                btn.innerText = s;
                btn.onclick = () => { currentSub = s; renderSubs(); };
                container.appendChild(btn);
            });
        };

        window.setType = (t) => {
            currentType = t;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`type-${t}`).classList.add('active');
            
            if(t.includes('mandatory') && !mandatorySubs.includes(currentSub)) {
                currentSub = 'Matematika';
            }
            renderSubs();
        };

        window.saveData = async () => {
            const q = document.getElementById('m-q').value;
            if(!q) return;

            try {
                await addDoc(collection(db, "quizzes"), {
                    type: currentType,
                    subject: currentSub,
                    question: q,
                    options: { 
                        A: document.getElementById('m-a').value, 
                        B: document.getElementById('m-b').value,
                        C: document.getElementById('m-c').value, 
                        D: document.getElementById('m-d').value 
                    },
                    correctAnswer: document.getElementById('m-cor').value,
                    createdAt: serverTimestamp()
                });
                showToast("✅ Muvaffaqiyatli saqlandi!");
                document.getElementById('m-q').value = "";
            } catch (e) { alert("Xatolik!"); }
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        renderSubs();
    </script>
</body>
</html>
