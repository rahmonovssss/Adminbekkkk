<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testlarni Tahrirlash - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 15px; }
        
        .header { max-width: 800px; margin: auto; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #ffd700; color: #000; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }

        .filter-section { max-width: 800px; margin: auto; background: #1a2a33; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        select { width: 100%; padding: 10px; background: #0f2027; color: white; border: 1px solid #ffd700; border-radius: 8px; outline: none; margin-top: 5px; }

        .quiz-card { background: #1a2a33; padding: 15px; border-radius: 15px; margin: auto; max-width: 800px; margin-bottom: 15px; border-left: 5px solid #ffd700; position: relative; }
        .quiz-card h4 { font-size: 15px; margin-bottom: 8px; color: #ffd700; }
        .quiz-info { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
        .options-list { font-size: 13px; margin-bottom: 10px; }
        .correct { color: #00ff00; font-weight: bold; }

        .actions { display: flex; gap: 10px; }
        .btn-del { background: #ff4b2b; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        
        #loader { text-align: center; margin-top: 20px; color: #ffd700; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Bazadagi Testlar</h2>
        <a href="admin.html" class="back-btn">⬅ Orqaga</a>
    </div>

    <div class="filter-section">
        <label style="font-size: 12px; color: #ffd700;">Test turini tanlang:</label>
        <select id="filter-type" onchange="loadQuizzes()">
            <option value="free">🎁 Bepul (Mutaxassislik)</option>
            <option value="premium">💎 Premium (Mutaxassislik)</option>
            <option value="free_mandatory">📌 Bepul uchun Majburiy</option>
            <option value="premium_mandatory">🔥 Premium uchun Majburiy</option>
        </select>
    </div>

    <div id="loader">Yuklanmoqda...</div>
    <div id="quiz-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loadQuizzes = async () => {
            const listContainer = document.getElementById('quiz-list');
            const loader = document.getElementById('loader');
            const type = document.getElementById('filter-type').value;

            listContainer.innerHTML = "";
            loader.style.display = "block";

            try {
                const q = query(
                    collection(db, "quizzes"), 
                    where("type", "==", type),
                    orderBy("createdAt", "desc")
                );
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    listContainer.innerHTML = "<p style='text-align:center; opacity:0.5;'>Bu turda savollar topilmadi.</p>";
                }

                snap.forEach(testDoc => {
                    const data = testDoc.data();
                    const id = testDoc.id;

                    const card = document.createElement('div');
                    card.className = "quiz-card";
                    card.innerHTML = `
                        <div class="quiz-info">Fan: ${data.subject} | Tur: ${data.type}</div>
                        <h4>${data.question}</h4>
                        <div class="options-list">
                            A) ${data.options.A} <br>
                            B) ${data.options.B} <br>
                            C) ${data.options.C} <br>
                            D) ${data.options.D} <br>
                            <span class="correct">To'g'ri javob: ${data.correctAnswer}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-del" onclick="deleteQuiz('${id}')">O'chirish</button>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                alert("Xatolik: Ehtimol bazada 'createdAt' bo'yicha Index yaratilmagan. Console'ni tekshiring.");
            } finally {
                loader.style.display = "none";
            }
        };

        window.deleteQuiz = async (id) => {
            if(confirm("Ushbu savolni o'chirishni xohlaysizmi?")) {
                await deleteDoc(doc(db, "quizzes", id));
                alert("O'chirildi!");
                loadQuizzes();
            }
        };

        // Sahifa yuklanganda bepul testlarni ko'rsatish
        loadQuizzes();
    </script>
</body>
</html>
