<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Qo'shish - Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; min-height: 100vh; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; max-width: 900px; margin-inline: auto; }
        .back-btn { text-decoration: none; color: white; font-size: 24px; margin-right: 20px; }

        .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        .card { background: #1a2a33; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h3 { margin-bottom: 15px; color: #ffd700; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
        .admin-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none;
        }
        .admin-input:focus { border-color: #ffd700; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-outline { background: transparent; border: 2px dashed #ffd700; color: #ffd700; }
        .btn-blue { background: #00d2ff; color: white; margin-top: 30px; }

        /* JADVAL QISMI */
        .preview-area { grid-column: 1 / -1; background: #1a2a33; border-radius: 20px; padding: 20px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #ffd700; }
        .edit-input { background: none; border: 1px solid transparent; color: white; width: 100%; padding: 5px; }
        .delete-btn { color: #ff4b2b; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="admin.html" class="back-btn">⬅</a>
        <h2>Test Qo'shish (PDF & Qo'lda)</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3>Qo'lda kiritish</h3>
            <div class="input-group">
                <label>Savol matni</label>
                <input type="text" id="manual-q" class="admin-input" placeholder="Savolni yozing">
            </div>
            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="manual-a" class="admin-input" placeholder="A variant">
                <input type="text" id="manual-b" class="admin-input" placeholder="B variant">
                <input type="text" id="manual-c" class="admin-input" placeholder="C variant">
                <input type="text" id="manual-d" class="admin-input" placeholder="D variant">
            </div>
            <div class="input-group">
                <label>To'g'ri javob</label>
                <select id="manual-correct" class="admin-input">
                    <option value="A">A variant</option>
                    <option value="B">B variant</option>
                    <option value="C">C variant</option>
                    <option value="D">D variant</option>
                </select>
            </div>
            <button class="btn btn-gold" onclick="addFromManual()">RO'YXATGA QO'SHISH</button>
        </div>

        <div class="card">
            <h3>PDF Fayl orqali</h3>
            <p style="font-size: 12px; opacity: 0.6; margin-bottom: 15px;">PDF tanlasangiz savollar avtomatik ajratiladi.</p>
            <input type="file" id="pdf-input" style="display: none;" accept="application/pdf" onchange="handlePDF(this)">
            <button class="btn btn-outline" onclick="document.getElementById('pdf-input').click()">PDF TANLASH</button>
            
            <button class="btn btn-gold" style="margin-top: 20px;" onclick="uploadAllToFirebase()" id="save-all-btn">BARCHASINI BAZAGA SAQLASH</button>
        </div>

        <div class="preview-area">
            <h3>Yangi yuklanganlar (<span id="count">0</span> ta)</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Savol</th><th>A</th><th>B</th><th>C</th><th>D</th><th>Javob</th><th>#</th>
                        </tr>
                    </thead>
                    <tbody id="quiz-body"></tbody>
                </table>
            </div>
            
            <button class="btn btn-blue" onclick="location.href='edit-quizzes.html'">
                ⚙️ BAZADAGI BARCHA TESTLARNI TAHRIRLASH
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let tempQuizzes = [];

        function renderTable() {
            const body = document.getElementById('quiz-body');
            document.getElementById('count').innerText = tempQuizzes.length;
            body.innerHTML = "";
            tempQuizzes.forEach((q, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input class="edit-input" value="${q.question}" onchange="tempQuizzes[${i}].question=this.value"></td>
                    <td><input class="edit-input" value="${q.A}" onchange="tempQuizzes[${i}].A=this.value"></td>
                    <td><input class="edit-input" value="${q.B}" onchange="tempQuizzes[${i}].B=this.value"></td>
                    <td><input class="edit-input" value="${q.C}" onchange="tempQuizzes[${i}].C=this.value"></td>
                    <td><input class="edit-input" value="${q.D}" onchange="tempQuizzes[${i}].D=this.value"></td>
                    <td><input class="edit-input" style="width:30px" value="${q.correct}" onchange="tempQuizzes[${i}].correct=this.value"></td>
                    <td class="delete-btn" onclick="tempQuizzes.splice(${i},1); renderTable();">✕</td>
                `;
                body.appendChild(row);
            });
        }

        window.addFromManual = () => {
            const q = {
                question: document.getElementById('manual-q').value,
                A: document.getElementById('manual-a').value,
                B: document.getElementById('manual-b').value,
                C: document.getElementById('manual-c').value,
                D: document.getElementById('manual-d').value,
                correct: document.getElementById('manual-correct').value
            };
            if(!q.question || !q.A) return alert("Ma'lumot to'liq emas!");
            tempQuizzes.push(q);
            renderTable();
            ['manual-q','manual-a','manual-b','manual-c','manual-d'].forEach(id => document.getElementById(id).value="");
        };

        window.handlePDF = async (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullText += text.items.map(s => s.str).join(" ") + " ";
                }
                const blocks = fullText.split(/\d+[\.\)]/).filter(t => t.length > 10);
                blocks.forEach(b => {
                    const p = b.split(/[A-D][\)\.]/);
                    if(p.length >= 3) {
                        tempQuizzes.push({ question: p[0].trim(), A: p[1]?.trim(), B: p[2]?.trim(), C: p[3]?.trim(), D: p[4]?.trim(), correct: "A" });
                    }
                });
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        };

        window.uploadAllToFirebase = async () => {
            if(tempQuizzes.length === 0) return;
            const btn = document.getElementById('save-all-btn');
            btn.innerText = "YUKLANMOQDA...";
            try {
                for(let item of tempQuizzes) {
                    await addDoc(collection(db, "quizzes"), {
                        question: item.question,
                        options: { A: item.A, B: item.B, C: item.C, D: item.D },
                        correctAnswer: item.correct,
                        createdAt: serverTimestamp()
                    });
                }
                alert("Bazaga saqlandi!");
                tempQuizzes = []; renderTable();
            } catch (e) { alert("Xato!"); }
            finally { btn.innerText = "BARCHASINI BAZAGA SAQLASH"; }
        };

        window.renderTable = renderTable;
    </script>
</body>
</html>
