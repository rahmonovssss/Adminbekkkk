<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Qo'shish - Dr. Rahmonov</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; }
        .card { background: #1a2a33; padding: 25px; border-radius: 20px; margin-bottom: 20px; max-width: 600px; margin-inline: auto; }
        h3 { color: #ffd700; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .admin-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-outline { background: transparent; border: 2px dashed #ffd700; color: #ffd700; }
        .btn-blue { background: #00d2ff; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Qo'lda kiritish</h3>
        <input type="text" id="m-q" class="admin-input" placeholder="Savol">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="m-a" class="admin-input" placeholder="A">
            <input type="text" id="m-b" class="admin-input" placeholder="B">
            <input type="text" id="m-c" class="admin-input" placeholder="C">
            <input type="text" id="m-d" class="admin-input" placeholder="D">
        </div>
        <select id="m-cor" class="admin-input">
            <option value="A">A variant</option><option value="B">B variant</option>
            <option value="C">C variant</option><option value="D">D variant</option>
        </select>
        <button class="btn btn-gold" onclick="addManual()">BAZAGA SAQLASH</button>
    </div>

    <div class="card">
        <h3>PDF Fayl orqali</h3>
        <input type="file" id="pdf-f" hidden accept="application/pdf" onchange="processPDF(this)">
        <button class="btn btn-outline" onclick="document.getElementById('pdf-f').click()">PDF TANLASH</button>
        <button class="btn btn-gold" id="save-btn" style="display:none;" onclick="uploadPDFQuizzes()">BARCHASINI BAZAGA SAQLASH</button>
    </div>

    <div style="max-width: 600px; margin-inline: auto;">
        <button class="btn btn-blue" onclick="location.href='edit-quizzes.html'">⚙️ BAZADAGI BARCHA TESTLARNI TAHRIRLASH</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let pdfData = [];

        window.addManual = async () => {
            const data = {
                question: document.getElementById('m-q').value,
                options: {
                    A: document.getElementById('m-a').value, B: document.getElementById('m-b').value,
                    C: document.getElementById('m-c').value, D: document.getElementById('m-d').value
                },
                correctAnswer: document.getElementById('m-cor').value,
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, "quizzes"), data);
            alert("Saqlandi!");
            location.reload();
        };

        window.processPDF = async (input) => {
            // PDF o'qish mantiqi va pdfData ga yuklash...
            document.getElementById('save-btn').style.display = 'block';
        };

        window.uploadPDFQuizzes = async () => {
            // pdfData ni bazaga yuklash...
            alert("PDF testlar bazaga saqlandi!");
        };
    </script>
</body>
</html>
