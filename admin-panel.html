<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Billing - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --success: #4caf50; --danger: #ff4b2b; --bg: #0f2027; --card-bg: #1e2a33; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h2 { color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 30px; }
        .request-card { 
            background: var(--card-bg); padding: 20px; border-radius: 18px; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .info h3 { margin: 0; font-size: 18px; color: #fff; }
        .price { color: #ffd700; font-weight: bold; font-size: 20px; margin-top: 5px; }
        .btn { border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-ok { background: var(--success); color: white; }
        .btn-no { background: var(--danger); color: white; margin-left: 8px; }
        .status-msg { text-align: center; padding: 30px; color: #888; font-style: italic; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 15px; overflow: hidden; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(0,210,255,0.1); color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='admin-panel.html'" style="background:none; border:1px solid #555; color:white; padding:8px 20px; border-radius:10px; cursor:pointer; margin-bottom:20px;">⬅ Admin Panelga qaytish</button>
    
    <h2>📩 Kutilayotgan to'lovlar (Pending)</h2>
    <div id="request-list" class="status-msg">Firestore ulanmoqda...</div>

    <h2>📜 Tasdiqlanganlar tarixi</h2>
    <table>
        <thead>
            <tr>
                <th>Ism-sharif</th>
                <th>Summa</th>
                <th>Holat</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody id="history-list">
            <tr><td colspan="4" class="status-msg">Yuklanmoqda...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const paymentCol = collection(db, "payment_requests");

    // 1. PENDING SO'ROVLAR (Real-time)
    onSnapshot(query(paymentCol, where("status", "==", "pending")), (snapshot) => {
        const list = document.getElementById('request-list');
        if (snapshot.empty) {
            list.innerHTML = "Hozircha kutilayotgan to'lovlar yo'q. ✅";
            return;
        }
        list.innerHTML = "";
        snapshot.forEach((res) => {
            const data = res.data();
            // DIQQAT: userId va uID nomlanishiga e'tibor bering
            const currentUID = data.userId || data.uID; 
            
            list.innerHTML += `
                <div class="request-card">
                    <div class="info">
                        <h3>${data.fio || 'Noma\'lum'}</h3>
                        <p style="font-size:12px; opacity:0.6;">Foydalanuvchi ID: ${currentUID}</p>
                        <div class="price">${data.amount?.toLocaleString()} so'm</div>
                    </div>
                    <div>
                        <button class="btn btn-ok" onclick="approvePayment('${res.id}', '${currentUID}', ${data.amount})">TASDIQLASH</button>
                        <button class="btn btn-no" onclick="deleteRequest('${res.id}')">RAD ETISH</button>
                    </div>
                </div>`;
        });
    }, (error) => {
        console.error("Firebase Error:", error);
        document.getElementById('request-list').innerHTML = "Xatolik yuz berdi. Konsolni tekshiring.";
    });

    // 2. APPROVED SO'ROVLAR (Tarix)
    onSnapshot(query(paymentCol, where("status", "==", "approved")), (snapshot) => {
        const hList = document.getElementById('history-list');
        if (snapshot.empty) {
            hList.innerHTML = "<tr><td colspan='4' class='status-msg'>Tasdiqlangan to'lovlar mavjud emas.</td></tr>";
            return;
        }
        hList.innerHTML = "";
        snapshot.forEach((res) => {
            const data = res.data();
            hList.innerHTML += `
                <tr>
                    <td>${data.fio || '---'}</td>
                    <td style="color:#ffd700; font-weight:bold;">${data.amount?.toLocaleString()} so'm</td>
                    <td style="color:#4caf50;">Qabul qilindi</td>
                    <td><button class="btn btn-no" style="padding:5px 10px;" onclick="deleteRequest('${res.id}')">🗑</button></td>
                </tr>`;
        });
    });

    // 3. TASDIQLASH FUNKSIYASI
    window.approvePayment = async (docId, userId, amount) => {
        if(!userId || userId === "undefined") {
            alert("Xato: Foydalanuvchi ID topilmadi!");
            return;
        }
        if(!confirm("Foydalanuvchi balansiga " + amount + " so'm qo'shilsinmi?")) return;

        try {
            const userRef = doc(db, "users", userId);
            
            // Balansni yangilash
            await updateDoc(userRef, {
                balance: increment(parseInt(amount))
            });

            // So'rov holatini o'zgartirish
            await updateDoc(doc(db, "payment_requests", docId), {
                status: "approved"
            });

            alert("Muvaffaqiyatli tasdiqlandi! Balans yangilandi. ✅");
        } catch (e) {
            console.error(e);
            alert("Xatolik: " + e.message + "\n\nEslatma: 'users' kolleksiyasida ushbu ID mavjudligini tekshiring.");
        }
    };

    // 4. O'CHIRISH FUNKSIYASI
    window.deleteRequest = async (id) => {
        if(confirm("Ushbu so'rovni o'chirib tashlamoqchimisiz?")) {
            await deleteDoc(doc(db, "payment_requests", id));
        }
    };
</script>
</body>
</html>
