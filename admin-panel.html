<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Dr. Rahmonov</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { 
            background: #1e293b; padding: 20px; border-radius: 12px; 
            margin-bottom: 10px; border: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-ok { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-no { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .sum { color: #38bdf8; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">📥 To'lov So'rovlari</h2>
        <div id="payment-list">Yuklanmoqda...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kutilayotgan to'lovlarni chiqarish
        const q = query(collection(db, "payments"), where("status", "==", "kutilmoqda"));

        onSnapshot(q, (snap) => {
            const list = document.getElementById('payment-list');
            list.innerHTML = "";
            snap.forEach((item) => {
                const p = item.data();
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `
                    <div>
                        <b>${p.fio}</b><br>
                        <span class="sum">${p.summa.toLocaleString()} so'm</span>
                    </div>
                    <div>
                        <button class="btn-ok" onclick="action('${item.id}', 'tasdiqlandi')">OK</button>
                        <button class="btn-no" onclick="action('${item.id}', 'rad_etildi')">X</button>
                    </div>
                `;
                list.appendChild(div);
            });
            if(snap.empty) list.innerHTML = "Hozircha so'rovlar yo'q.";
        });

        window.action = async (id, stat) => {
            try {
                const payRef = doc(db, "payments", id);
                const paySnap = await getDoc(payRef);
                const pData = paySnap.data();

                if (stat === 'tasdiqlandi') {
                    // Foydalanuvchi balansini oshirish
                    const userRef = doc(db, "users", pData.uid);
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        const currentBal = Number(userSnap.data().balance || 0);
                        await updateDoc(userRef, { balance: currentBal + Number(pData.summa) });
                    }
                }

                // To'lov statusini o'zgartirish
                await updateDoc(payRef, { status: stat });
                alert("Bajarildi!");

            } catch (e) {
                console.error(e);
                alert("Xato: Rules (Qoidalar)ni tekshiring! " + e.message);
            }
        };
    </script>
</body>
</html>
