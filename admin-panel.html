<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Tasdiqlash - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; padding: 20px; }
        .req-card { 
            background: #1e2a33; padding: 15px; margin-bottom: 10px; 
            border-left: 5px solid #00d2ff; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .info b { color: #00d2ff; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #4caf50; color: white; }
        .btn-del { background: #ff4b2b; color: white; margin-left: 5px; }
        .time { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <h2>📩 To'lov so'rovlari (Pending)</h2>
    <div id="list">Yuklanmoqda...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. FAQAT 'pending' BO'LGANLARNI KO'RSATISH
    const q = query(collection(db, "payment_requests"), where("status", "==", "pending"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = snap.empty ? "Hozircha yangi so'rovlar yo'q." : "";
        
        snap.forEach((res) => {
            const data = res.data();
            const vaqt = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : "Hozirgina";
            
            listDiv.innerHTML += `
                <div class="req-card">
                    <div class="info">
                        <p>👤 <b>Ism:</b> ${data.fio}</p>
                        <p>🆔 <b>User ID:</b> ${data.userId}</p>
                        <p>💰 <b>Summa:</b> ${data.amount} so'm</p>
                        <p class="time">⏰ ${vaqt}</p>
                    </div>
                    <div>
                        <button class="btn btn-ok" onclick="approve('${res.id}', '${data.userId}', ${data.amount})">✅ TASDIQLASH</button>
                        <button class="btn btn-del" onclick="reject('${res.id}')">🗑 O'CHIRISH</button>
                    </div>
                </div>`;
        });
    });

    // 2. TASDIQLASH FUNKSIYASI
    window.approve = async (docId, uID, sum) => {
        if(!confirm(sum + " so'mni balansga qo'shasizmi?")) return;

        try {
            // A) Users kolleksiyasida balansni oshirish
            const userRef = doc(db, "users", uID);
            await updateDoc(userRef, {
                balance: increment(Number(sum))
            });

            // B) So'rovni yopish (approved qilish)
            await updateDoc(doc(db, "payment_requests", docId), {
                status: "approved"
            });

            alert("Balans yangilandi! ✅");
        } catch (e) {
            alert("Xatolik! 'users' kolleksiyasida " + uID + " ID-li foydalanuvchi bormi?");
            console.error(e);
        }
    };

    // 3. O'CHIRISH
    window.reject = async (id) => {
        if(confirm("So'rovni o'chirib yuborasizmi?")) {
            await deleteDoc(doc(db, "payment_requests", id));
        }
    };

</script>
</body>
</html>
