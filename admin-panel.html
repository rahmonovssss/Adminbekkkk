<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; padding: 20px; }
        .req-card { 
            background: #1e2a33; padding: 15px; margin-bottom: 10px; 
            border-left: 5px solid #00d2ff; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .info p { margin: 5px 0; font-size: 14px; }
        .info b { color: #00d2ff; }
        .amount { color: #ffd700; font-weight: bold; font-size: 18px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ok { background: #4caf50; color: white; }
        .btn-ok:hover { background: #45a049; }
        .time { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>📩 To'lov so'rovlari (Kutilmoqda)</h2>
    <div id="list">Yuklanmoqda...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Faqat 'pending' statusidagilarni real-vaqtda olish
    const q = query(collection(db, "payment_requests"), where("status", "==", "pending"));

    onSnapshot(q, (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = snap.empty ? "Hozircha yangi so'rovlar yo'q." : "";
        
        snap.forEach((res) => {
            const data = res.data();
            // Vaqtni o'qish formatiga o'tkazish
            const vaqt = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : "Hozirgina";
            
            listDiv.innerHTML += `
                <div class="req-card" id="card-${res.id}">
                    <div class="info">
                        <p>👤 <b>Ism:</b> ${data.fio}</p>
                        <p>🆔 <b>User ID:</b> ${data.userId}</p>
                        <p class="amount">💰 ${data.amount} so'm</p>
                        <p class="time">⏰ ${vaqt}</p>
                    </div>
                    <button class="btn btn-ok" onclick="approveRequest('${res.id}', '${data.userId}', ${data.amount})">TASDIQLASH</button>
                </div>`;
        });
    });

    // 2. Tasdiqlash va Balansni oshirish
    window.approveRequest = async (docId, uID, sum) => {
        if(!confirm(sum + " so'mni tasdiqlaysizmi?")) return;

        try {
            // A) Foydalanuvchi balansini yangilash
            const userRef = doc(db, "users", uID);
            await updateDoc(userRef, {
                balance: increment(Number(sum))
            });

            // B) So'rovni yopish (ro'yxatdan yo'qoladi)
            const reqRef = doc(db, "payment_requests", docId);
            await updateDoc(reqRef, {
                status: "approved"
            });

            alert("Balans muvaffaqiyatli qo'shildi! ✅");
        } catch (e) {
            console.error(e);
            alert("Xatolik yuz berdi! Foydalanuvchi ID-si bazada bormi?");
        }
    };
</script>
</body>
</html>
