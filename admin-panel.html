<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Billing - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --success: #4caf50; --danger: #ff4b2b; --bg: #0f2027; --card-bg: #1e2a33; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h2 { color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .request-card { 
            background: var(--card-bg); padding: 20px; border-radius: 18px; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .price { color: #ffd700; font-weight: bold; font-size: 20px; }
        .btn { border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-left: 10px; }
        .btn-ok { background: var(--success); color: white; }
        .btn-no { background: var(--danger); color: white; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 15px; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-msg { text-align: center; padding: 30px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='admin-panel.html'" style="background:none; border:1px solid #555; color:white; padding:8px 20px; border-radius:10px; cursor:pointer; margin-bottom:20px;">⬅ Orqaga</button>
    
    <h2>📩 Yangi so'rovlar (Pending)</h2>
    <div id="request-list" class="status-msg">Qidirilmoqda...</div>

    <h2 style="margin-top: 50px;">📜 Tasdiqlanganlar (Approved)</h2>
    <table>
        <thead>
            <tr>
                <th>Foydalanuvchi</th>
                <th>Summa</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody id="history-list">
            <tr><td colspan="3" class="status-msg">Yuklanmoqda...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // MUHIM: Indeks xatosini oldini olish uchun orderBy'ni vaqtincha olib tashladim
    const paymentCol = collection(db, "payment_requests");

    // 1. YANGI SO'ROVLARNI ESHITISH
    onSnapshot(query(paymentCol, where("status", "==", "pending")), (snapshot) => {
        const list = document.getElementById('request-list');
        if (snapshot.empty) {
            list.innerHTML = "Hozircha yangi so'rovlar yo'q. Bazani tekshiring.";
            return;
        }
        list.innerHTML = "";
        snapshot.forEach((res) => {
            const data = res.data();
            list.innerHTML += `
                <div class="request-card">
                    <div>
                        <h3>${data.fio || 'Ismsiz'}</h3>
                        <p style="font-size:12px; opacity:0.6;">ID: ${data.userId}</p>
                        <div class="price">${data.amount?.toLocaleString()} so'm</div>
                    </div>
                    <div>
                        <button class="btn btn-ok" onclick="approve('${res.id}', '${data.userId}', ${data.amount})">TASDIQLASH</button>
                        <button class="btn btn-no" onclick="removeReq('${res.id}')">O'CHIRISH</button>
                    </div>
                </div>`;
        });
    }, (err) => {
        alert("Xato (Pending): " + err.message);
    });

    // 2. TASDIQLANGANLARNI ESHITISH
    onSnapshot(query(paymentCol, where("status", "==", "approved")), (snapshot) => {
        const hList = document.getElementById('history-list');
        hList.innerHTML = snapshot.empty ? "<tr><td colspan='3' class='status-msg'>Tarix bo'sh.</td></tr>" : "";
        snapshot.forEach((res) => {
            const data = res.data();
            hList.innerHTML += `
                <tr>
                    <td>${data.fio || 'Noma'lum'}</td>
                    <td style="color:#ffd700;">${data.amount?.toLocaleString()} so'm</td>
                    <td><button class="btn btn-no" style="padding:5px 10px;" onclick="removeReq('${res.id}')">🗑</button></td>
                </tr>`;
        });
    }, (err) => {
        alert("Xato (Approved): " + err.message);
    });

    // AMALLAR
    window.approve = async (id, uid, amt) => {
        if(!confirm("Foydalanuvchi balansiga " + amt + " so'm qo'shilsinmi?")) return;
        try {
            // Balansni oshirish
            await updateDoc(doc(db, "users", uid), { balance: increment(Number(amt)) });
            // Statusni o'zgartirish
            await updateDoc(doc(db, "payment_requests", id), { status: "approved" });
            alert("Muvaffaqiyatli tasdiqlandi!");
        } catch(e) {
            alert("Xatolik: " + e.message);
        }
    };

    window.removeReq = async (id) => {
        if(confirm("Haqiqatdan ham o'chirmoqchimisiz?")) {
            await deleteDoc(doc(db, "payment_requests", id));
        }
    };

</script>
</body>
</html>
