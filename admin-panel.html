<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; padding: 20px; }
        .req-card { 
            background: #1e2a33; padding: 15px; margin-bottom: 10px; 
            border-left: 5px solid #00d2ff; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #4caf50; color: white; }
        #error-log { color: #ff4b2b; background: rgba(0,0,0,0.3); padding: 10px; display: none; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>📩 To'lov so'rovlari</h2>
    <div id="error-log"></div>
    <div id="list">Yuklanmoqda...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Ma'lumotni o'qish (Hech qanday murakkab filtrsiz - indeks so'ramaydi)
    onSnapshot(collection(db, "payment_requests"), (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = ""; 

        if (snap.empty) {
            listDiv.innerHTML = "Bazada hech qanday ma'lumot yo'q.";
            return;
        }

        let hasPending = false;
        snap.forEach((res) => {
            const data = res.data();
            
            // Faqat 'pending' holatdagilarni JavaScript orqali chiqaramiz
            if (data.status === "pending") {
                hasPending = true;
                listDiv.innerHTML += `
                    <div class="req-card">
                        <div>
                            <p>👤 <b>Ism:</b> ${data.fio || 'Noma\'lum'}</p>
                            <p>🆔 <b>User ID:</b> ${data.userId}</p>
                            <p>💰 <b>Summa:</b> ${data.amount} so'm</p>
                        </div>
                        <button class="btn btn-ok" onclick="approve('${res.id}', '${data.userId}', ${data.amount})">✅ TASDIQLASH</button>
                    </div>`;
            }
        });

        if (!hasPending) listDiv.innerHTML = "Hozircha yangi (pending) so'rovlar yo'q.";

    }, (error) => {
        // Agar biror xato bo'lsa (masalan Rules ruxsat bermasa) ekranda chiqadi
        const log = document.getElementById('error-log');
        log.style.display = "block";
        log.innerText = "Firebase Xatosi: " + error.message;
    });

    window.approve = async (docId, uID, sum) => {
        if(!confirm(sum + " so'mni qo'shasizmi?")) return;
        try {
            await updateDoc(doc(db, "users", uID), { balance: increment(Number(sum)) });
            await updateDoc(doc(db, "payment_requests", docId), { status: "approved" });
            alert("Bajarildi! ✅");
        } catch (e) {
            alert("Xatolik: " + e.message);
        }
    };

</script>
</body>
</html>
