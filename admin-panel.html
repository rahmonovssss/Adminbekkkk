<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Dr. Rahmonov - Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { 
            background: #1e293b; border-radius: 16px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .info b { color: #38bdf8; font-size: 18px; }
        .info p { margin: 5px 0; color: #94a3b8; font-size: 14px; }
        .sum { color: #4ade80; font-weight: bold; font-size: 16px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-ok { background: #10b981; }
        .btn-no { background: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #38bdf8;">📥 Yangi To'lovlar</h2>
    <div id="list">Yuklanmoqda...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Kutilayotganlarni tinglash
    const q = query(collection(db, "payments"), where("status", "==", "kutilmoqda"));

    onSnapshot(q, (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        if(snap.empty) listDiv.innerHTML = "<p style='text-align:center;'>Yangi so'rovlar yo'q.</p>";

        snap.forEach((item) => {
            const p = item.data();
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="info">
                    <b>${p.fio}</b>
                    <p>ID: ${p.studentID}</p>
                    <span class="sum">${p.summa.toLocaleString()} so'm</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-ok" onclick="handleAction('${item.id}', 'tasdiqlandi')">✅</button>
                    <button class="btn btn-no" onclick="handleAction('${item.id}', 'rad_etildi')">❌</button>
                </div>
            `;
            listDiv.appendChild(div);
        });
    });

    window.handleAction = async (id, stat) => {
        try {
            const payRef = doc(db, "payments", id);
            const paySnap = await getDoc(payRef);
            const pData = paySnap.data();

            if (stat === 'tasdiqlandi') {
                // FOYDALANUVCHI BALANSINI OSHIRISH
                const userRef = doc(db, "users", pData.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const currentBal = Number(userSnap.data().balance || 0);
                    await updateDoc(userRef, { balance: currentBal + Number(pData.summa) });
                }
            }

            // STATUSNI YANGILASH
            await updateDoc(payRef, { status: stat });
            alert("Muvaffaqiyatli bajarildi!");

        } catch (e) {
            alert("Xato: " + e.message);
        }
    };
</script>
</body>
</html>
