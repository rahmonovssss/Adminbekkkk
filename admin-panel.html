<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Test Admin - Dr. Rahmonov</title>
    <style>
        body { background: #0f2027; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e2a33; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-ok { background: #4caf50; color: white; }
        .btn-del { background: #ff4b2b; color: white; margin-left: 10px; }
        h2 { color: #00d2ff; }
    </style>
</head>
<body>

    <h2>📩 Kelgan so'rovlar (Test rejimi)</h2>
    <div id="test-list">Yuklanmoqda...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "payment_requests");

    // Barcha ma'lumotlarni filtrsiz chiqarish (Test uchun)
    onSnapshot(colRef, (snap) => {
        const list = document.getElementById('test-list');
        list.innerHTML = snap.empty ? "Baza bo'sh" : "";
        
        snap.forEach((res) => {
            const data = res.data();
            // User yuborayotgan hamma ehtimoliy nomlarni tekshiramiz
            const ism = data.fio || "Ism yo'q";
            const summa = data.amount || 0;
            const uID = data.userId || data.userid || "ID yo'q";
            const holat = data.status || "no-status";

            list.innerHTML += `
                <div class="card">
                    <p><b>👤 Ism:</b> ${ism}</p>
                    <p><b>🆔 User ID:</b> ${uID}</p>
                    <p><b>💰 Summa:</b> ${summa} so'm</p>
                    <p><b>⚙️ Holat:</b> ${holat}</p>
                    <button class="btn btn-ok" onclick="testApprove('${res.id}', '${uID}', ${summa})">TASDIQLASH</button>
                    <button class="btn btn-del" onclick="testDelete('${res.id}')">O'CHIRISH</button>
                </div>`;
        });
    });

    // Tasdiqlash funksiyasi
    window.testApprove = async (docId, uID, amt) => {
        if(uID === "ID yo'q") return alert("Bu foydalanuvchining ID-si yo'q!");
        
        try {
            // 1. Balansni oshirish
            await updateDoc(doc(db, "users", uID), {
                balance: increment(Number(amt))
            });
            // 2. Statusni o'zgartirish
            await updateDoc(doc(db, "payment_requests", docId), {
                status: "approved"
            });
            alert("Bajarildi! ✅");
        } catch (e) {
            alert("Xatolik: " + e.message);
        }
    };

    window.testDelete = async (id) => {
        if(confirm("O'chirilsinmi?")) await deleteDoc(doc(db, "payment_requests", id));
    };

</script>
</body>
</html>
