<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Billing - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --success: #4caf50; --danger: #ff4b2b; --bg: #0f2027; --card-bg: #1e2a33; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h2 { color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 30px; }
        .request-card { 
            background: var(--card-bg); padding: 20px; border-radius: 18px; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .price { color: #ffd700; font-weight: bold; font-size: 20px; }
        .btn { border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-ok { background: var(--success); color: white; }
        .btn-no { background: var(--danger); color: white; margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 15px; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-msg { text-align: center; padding: 30px; color: #888; font-style: italic; }
        .debug-info { font-size: 10px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='admin-panel.html'" style="background:none; border:1px solid #555; color:white; padding:8px 20px; border-radius:10px; cursor:pointer; margin-bottom:20px;">⬅ Admin Panel</button>
    
    <h2>📩 Yangi so'rovlar (Pending)</h2>
    <div id="request-list" class="status-msg">Firestore ulanmoqda...</div>

    <h2>📜 Tasdiqlanganlar tarixi</h2>
    <table>
        <thead>
            <tr>
                <th>Foydalanuvchi</th>
                <th>Summa</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody id="history-list">
            <tr><td colspan="3" class="status-msg">Yuklanmoqda...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
        authDomain: "quiz-app-3692d.firebaseapp.com",
        projectId: "quiz-app-3692d",
        storageBucket: "quiz-app-3692d.firebasestorage.app",
        messagingSenderId: "526836020845",
        appId: "1:526836020845:android:3ea991380c104c75e8b164"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "payment_requests");

    // 1. PENDING (Yangi so'rovlarni o'qish)
    // orderBy ishlatmadim, chunki bu Indeks xatosini berishi mumkin.
    onSnapshot(query(colRef, where("status", "==", "pending")), (snap) => {
        const list = document.getElementById('request-list');
        if (snap.empty) {
            list.innerHTML = "Hozircha kutilayotgan to'lovlar yo'q. ✨";
            return;
        }
        list.innerHTML = "";
        snap.forEach((res) => {
            const data = res.data();
            // Rasmingizdagi field: userId (I harfi katta)
            const uID = data.userId || data.userid; 
            
            list.innerHTML += `
                <div class="request-card">
                    <div>
                        <h3>${data.fio || 'Ismsiz'}</h3>
                        <div class="debug-info">UID: ${uID} | Doc: ${res.id}</div>
                        <div class="price">${data.amount?.toLocaleString()} so'm</div>
                    </div>
                    <div>
                        <button class="btn btn-ok" onclick="approve('${res.id}', '${uID}', ${data.amount})">TASDIQLASH</button>
                        <button class="btn btn-no" onclick="del('${res.id}')">RAD ETISH</button>
                    </div>
                </div>`;
        });
    }, (error) => {
        console.error("Xatolik:", error);
        document.getElementById('request-list').innerHTML = "<span style='color:red'>Xato: " + error.message + "</span>";
    });

    // 2. APPROVED (Tarixni o'qish)
    onSnapshot(query(colRef, where("status", "==", "approved")), (snap) => {
        const hList = document.getElementById('history-list');
        hList.innerHTML = snap.empty ? "<tr><td colspan='3' class='status-msg'>Hali tasdiqlanganlar yo'q.</td></tr>" : "";
        snap.forEach((res) => {
            const data = res.data();
            hList.innerHTML += `
                <tr>
                    <td>${data.fio || '---'}</td>
                    <td style="color:#ffd700; font-weight:bold;">${data.amount?.toLocaleString()} so'm</td>
                    <td><button class="btn btn-no" style="padding:5px 10px;" onclick="del('${res.id}')">🗑</button></td>
                </tr>`;
        });
    });

    // 3. TASDIQLASH FUNKSIYASI
    window.approve = async (docId, uID, amount) => {
        if (!uID || uID === "undefined") {
            alert("Xato: Foydalanuvchi ID topilmadi! Bazadagi 'userId' maydonini tekshiring.");
            return;
        }
        if (!confirm(amount + " so'm balansga qo'shilsinmi?")) return;

        try {
            // Balansni oshirish ('users' kolleksiyasida ushbu uID hujjat bo'lishi shart)
            await updateDoc(doc(db, "users", uID), {
                balance: increment(Number(amount))
            });

            // Statusni yangilash
            await updateDoc(doc(db, "payment_requests", docId), {
                status: "approved"
            });

            alert("Muvaffaqiyatli tasdiqlandi! ✅");
        } catch (e) {
            console.error(e);
            alert("Tasdiqlashda xato: " + e.message);
        }
    };

    window.del = async (id) => {
        if (confirm("Ushbu ma'lumotni o'chirmoqchimisiz?")) {
            await deleteDoc(doc(db, "payment_requests", id));
        }
    };

</script>
</body>
</html>
