<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin - To'lovlarni boshqarish</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .p-card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #00d2ff; display: flex; justify-content: space-between; align-items: center; }
        .btn-ok { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-no { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .sum { color: #00d2ff; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>📥 Yangi to'lov so'rovlari</h2>
    <div id="payment-list">Yuklanmoqda...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Faqat kutilayotganlarni chiqarish
        const q = query(collection(db, "payments"), where("status", "==", "kutilmoqda"));

        onSnapshot(q, (snap) => {
            const list = document.getElementById('payment-list');
            list.innerHTML = "";
            snap.forEach((item) => {
                const p = item.data();
                const div = document.createElement('div');
                div.className = "p-card";
                div.innerHTML = `
                    <div>
                        <b>${p.fio}</b> (${p.studentID})<br>
                        <span class="sum">${p.summa.toLocaleString()} so'm</span><br>
                        <small>${p.sana} ${p.vaqt}</small>
                    </div>
                    <div>
                        <button class="btn-ok" onclick="action('${p.paymentId}', 'tasdiqlandi')">TASDIQLASH</button>
                        <button class="btn-no" onclick="action('${p.paymentId}', 'rad_etildi')">RAD ETISH</button>
                    </div>
                `;
                list.appendChild(div);
            });
            if(snap.empty) list.innerHTML = "Hozircha so'rovlar yo'q.";
        });

        window.action = async (id, stat) => {
            try {
                await updateDoc(doc(db, "payments", id), { status: stat });
                alert("Bajarildi!");
            } catch (e) { alert("Xato: " + e.message); }
        };
    </script>
</body>
</html>
