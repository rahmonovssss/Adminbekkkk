<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcha Testlar - Dr. Rahmonov</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; }
        .quiz-card { background: #1a2a33; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #ffd700; }
        .edit-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; margin-top: 5px; }
        .btn-save { background: #00d2ff; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .btn-del { background: #ff4b2b; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; margin-bottom: 20px; color: #ffd700;">Bazadagi barcha testlar</h2>
    <div id="quiz-list">
        <p style="text-align: center; opacity: 0.5;">Yuklanmoqda...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // REAL-Vaqtda testlarni olish
        onSnapshot(collection(db, "quizzes"), (snapshot) => {
            const list = document.getElementById('quiz-list');
            list.innerHTML = "";
            if(snapshot.empty) { list.innerHTML = "Bazada testlar yo'q."; return; }

            snapshot.forEach((qDoc) => {
                const q = qDoc.data();
                const div = document.createElement('div');
                div.className = "quiz-card";
                div.innerHTML = `
                    <input class="edit-input" id="q-${qDoc.id}" value="${q.question}">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input class="edit-input" id="a-${qDoc.id}" value="${q.options.A}">
                        <input class="edit-input" id="b-${qDoc.id}" value="${q.options.B}">
                        <input class="edit-input" id="c-${qDoc.id}" value="${q.options.C}">
                        <input class="edit-input" id="d-${qDoc.id}" value="${q.options.D}">
                    </div>
                    <p style="margin-top:10px;">Javob: <input style="width:50px" class="edit-input" id="cor-${qDoc.id}" value="${q.correctAnswer}"></p>
                    <button class="btn-save" onclick="updateQuiz('${qDoc.id}')">SAQLASH</button>
                    <button class="btn-del" onclick="deleteQuiz('${qDoc.id}')">O'CHIRISH</button>
                `;
                list.appendChild(div);
            });
        });

        window.updateQuiz = async (id) => {
            const ref = doc(db, "quizzes", id);
            await updateDoc(ref, {
                question: document.getElementById(`q-${id}`).value,
                "options.A": document.getElementById(`a-${id}`).value,
                "options.B": document.getElementById(`b-${id}`).value,
                "options.C": document.getElementById(`c-${id}`).value,
                "options.D": document.getElementById(`d-${id}`).value,
                correctAnswer: document.getElementById(`cor-${id}`).value
            });
            alert("Yangilandi!");
        };

        window.deleteQuiz = async (id) => {
            if(confirm("O'chirilsinmi?")) await deleteDoc(doc(db, "quizzes", id));
        };
    </script>
</body>
</html>
