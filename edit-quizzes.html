<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testlarni Tahrirlash - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; min-height: 100vh; }

        .header { 
            max-width: 900px; margin: 0 auto 20px auto; 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: #0f2027; padding: 10px 0; z-index: 100;
        }
        .back-btn { text-decoration: none; color: white; font-size: 24px; }
        
        .search-box {
            width: 100%; max-width: 900px; margin: 0 auto 20px auto;
        }
        .search-input {
            width: 100%; padding: 12px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: white; outline: none; font-size: 15px;
        }

        .quiz-container { max-width: 900px; margin: 0 auto; }
        
        /* TEST CARD */
        .quiz-card {
            background: #1a2a33; border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border-left: 5px solid #ffd700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .label-tag { font-size: 11px; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .edit-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; outline: none;
        }
        .edit-input:focus { border-color: #00d2ff; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        .card-actions {
            display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-save { background: #00d2ff; color: #fff; }
        .btn-delete { background: #ff4b2b; color: #fff; }
        .btn-save:active, .btn-delete:active { transform: scale(0.95); }

        .loader { text-align: center; padding: 50px; opacity: 0.5; }
        
        /* TO'G'RI JAVOB SELECT */
        .correct-select {
            background: #00d2ff22; border: 1px solid #00d2ff; color: #00d2ff;
            padding: 5px 10px; border-radius: 5px; outline: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="admin.html" class="back-btn">⬅</a>
        <h2>Testlarni Tahrirlash</h2>
        <span id="total-count" style="color: #ffd700; font-weight: bold;">0 ta</span>
    </div>

    <div class="search-box">
        <input type="text" id="search" class="search-input" placeholder="Savollardan qidirish..." oninput="filterQuizzes()">
    </div>

    <div class="quiz-container" id="quiz-list">
        <div class="loader">Testlar yuklanmoqda...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allQuizzes = [];

        // --- BAZADAGI TESTLARNI REAL-TIME ESHITISH ---
        onSnapshot(collection(db, "quizzes"), (snapshot) => {
            allQuizzes = [];
            snapshot.forEach(doc => {
                allQuizzes.push({ id: doc.id, ...doc.data() });
            });
            // Vaqti bo'yicha tartiblash (eng yangisi tepada)
            allQuizzes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            displayQuizzes(allQuizzes);
        });

        function displayQuizzes(data) {
            const list = document.getElementById('quiz-list');
            document.getElementById('total-count').innerText = data.length + " ta";
            list.innerHTML = "";

            if(data.length === 0) {
                list.innerHTML = "<div class='loader'>Testlar topilmadi.</div>";
                return;
            }

            data.forEach(q => {
                const card = document.createElement('div');
                card.className = "quiz-card";
                card.innerHTML = `
                    <span class="label-tag">Savol matni</span>
                    <textarea class="edit-input" id="q-${q.id}" style="height: 60px;">${q.question}</textarea>
                    
                    <div class="options-grid">
                        <div><span class="label-tag">A Variant</span><input class="edit-input" id="a-${q.id}" value="${q.options.A}"></div>
                        <div><span class="label-tag">B Variant</span><input class="edit-input" id="b-${q.id}" value="${q.options.B}"></div>
                        <div><span class="label-tag">C Variant</span><input class="edit-input" id="c-${q.id}" value="${q.options.C}"></div>
                        <div><span class="label-tag">D Variant</span><input class="edit-input" id="d-${q.id}" value="${q.options.D}"></div>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
                        <div>
                            <span class="label-tag">To'g'ri javob</span>
                            <select class="correct-select" id="cor-${q.id}">
                                <option value="A" ${q.correctAnswer === 'A' ? 'selected' : ''}>A</option>
                                <option value="B" ${q.correctAnswer === 'B' ? 'selected' : ''}>B</option>
                                <option value="C" ${q.correctAnswer === 'C' ? 'selected' : ''}>C</option>
                                <option value="D" ${q.correctAnswer === 'D' ? 'selected' : ''}>D</option>
                            </select>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-delete" onclick="deleteQuiz('${q.id}')">O'CHIRISH</button>
                            <button class="btn btn-save" onclick="updateQuiz('${q.id}')">SAQLASH</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // --- QIDIRISH ---
        window.filterQuizzes = () => {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allQuizzes.filter(q => q.question.toLowerCase().includes(term));
            displayQuizzes(filtered);
        };

        // --- YANGILASH (TAHRIRLASH) ---
        window.updateQuiz = async (id) => {
            const btn = document.querySelector(`button[onclick="updateQuiz('${id}')"]`);
            btn.innerText = "WAIT...";
            
            try {
                const docRef = doc(db, "quizzes", id);
                await updateDoc(docRef, {
                    question: document.getElementById(`q-${id}`).value,
                    "options.A": document.getElementById(`a-${id}`).value,
                    "options.B": document.getElementById(`b-${id}`).value,
                    "options.C": document.getElementById(`c-${id}`).value,
                    "options.D": document.getElementById(`d-${id}`).value,
                    correctAnswer: document.getElementById(`cor-${id}`).value
                });
                alert("Muvaffaqiyatli yangilandi!");
            } catch (e) {
                alert("Xato: " + e.message);
            } finally {
                btn.innerText = "SAQLASH";
            }
        };

        // --- O'CHIRISH ---
        window.deleteQuiz = async (id) => {
            if(confirm("Haqiqatan ham ushbu savolni o'chirmoqchimisiz?")) {
                try {
                    await deleteDoc(doc(db, "quizzes", id));
                } catch (e) {
                    alert("O'chirishda xatolik!");
                }
            }
        };
    </script>
</body>
</html>
