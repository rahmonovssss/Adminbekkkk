<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testlarni Tahrirlash - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 20px; }

        /* --- FILTRLAR --- */
        .admin-panel { 
            background: #1a2a33; padding: 20px; border-radius: 20px; 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        select, .edit-input { 
            width: 100%; padding: 12px; border-radius: 10px;
            background: #0f2027; color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;
        }
        select:focus { border-color: #ffd700; }

        .section-title { color: #ffd700; margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 10px; }

        /* --- TEST KARTALARI --- */
        .quiz-card { 
            background: #1a2a33; padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border-left: 5px solid #ffd700; 
            position: relative; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        
        .btn-save { background: #00d2ff; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-del { background: #ff4b2b; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }

        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #ffd700; color: #000; padding: 12px 25px; border-radius: 50px;
            transition: 0.5s; z-index: 3000; font-weight: bold;
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2 class="section-title">Filtrlash va Qidirish</h2>
        <div class="filter-group">
            <select id="filter-type" onchange="loadQuizzes()">
                <option value="free">🎁 Bepul Testlar</option>
                <option value="premium">💎 Premium Testlar</option>
            </select>

            <select id="filter-subject" onchange="loadQuizzes()">
                <optgroup label="Majburiy Fanlar">
                    <option value="Matematika">Matematika (Majburiy)</option>
                    <option value="Ona tili">Ona tili (Majburiy)</option>
                    <option value="Tarix">O'zbekiston Tarixi (Majburiy)</option>
                </optgroup>
                <optgroup label="Asosiy Fanlar">
                    <option value="Kimyo">Kimyo</option>
                    <option value="Biologiya">Biologiya</option>
                    <option value="Ingiliz tili">Ingiliz tili</option>
                    <option value="Huquq">Huquq</option>
                    <option value="Geografiya">Geografiya</option>
                </optgroup>
            </select>
        </div>
    </div>

    <h2 class="section-title" id="list-title">Yangi yuklanganlar (0 ta)</h2>
    <div id="quiz-list">
        <p style="text-align: center; opacity: 0.5;">Tanlangan bo'lim bo'yicha testlar qidirilmoqda...</p>
    </div>

    <div id="toast">Yangilandi!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let unsubscribe = null;

        window.loadQuizzes = () => {
            const type = document.getElementById('filter-type').value;
            const subject = document.getElementById('filter-subject').value;
            const listContainer = document.getElementById('quiz-list');
            const title = document.getElementById('list-title');

            if (unsubscribe) unsubscribe();

            const q = query(
                collection(db, "quizzes"), 
                where("type", "==", type),
                where("subject", "==", subject)
            );

            unsubscribe = onSnapshot(q, (snapshot) => {
                listContainer.innerHTML = "";
                title.innerText = `Yangi yuklanganlar (${snapshot.size} ta)`;

                if(snapshot.empty) {
                    listContainer.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:20px;">Ushbu fanda hali testlar yo'q.</p>`;
                    return;
                }

                snapshot.forEach((qDoc) => {
                    const data = qDoc.data();
                    const div = document.createElement('div');
                    div.className = "quiz-card";
                    div.innerHTML = `
                        <textarea class="edit-input" id="q-${qDoc.id}" rows="2">${data.question}</textarea>
                        
                        <div class="grid-options">
                            <input class="edit-input" id="a-${qDoc.id}" value="${data.options.A}" placeholder="A variant">
                            <input class="edit-input" id="b-${qDoc.id}" value="${data.options.B}" placeholder="B variant">
                            <input class="edit-input" id="c-${qDoc.id}" value="${data.options.C}" placeholder="C variant">
                            <input class="edit-input" id="d-${qDoc.id}" value="${data.options.D}" placeholder="D variant">
                        </div>

                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
                            <label style="font-size:14px; color:#ffd700;">To'g'ri javob:</label>
                            <select id="cor-${qDoc.id}" style="width:80px; padding:5px;">
                                <option value="A" ${data.correctAnswer === 'A' ? 'selected' : ''}>A</option>
                                <option value="B" ${data.correctAnswer === 'B' ? 'selected' : ''}>B</option>
                                <option value="C" ${data.correctAnswer === 'C' ? 'selected' : ''}>C</option>
                                <option value="D" ${data.correctAnswer === 'D' ? 'selected' : ''}>D</option>
                            </select>
                        </div>

                        <button class="btn-save" onclick="updateQuiz('${qDoc.id}')">SAQLASH</button>
                        <button class="btn-del" onclick="deleteQuiz('${qDoc.id}')">O'CHIRISH</button>
                    `;
                    listContainer.appendChild(div);
                });
            });
        };

        window.updateQuiz = async (id) => {
            try {
                const ref = doc(db, "quizzes", id);
                await updateDoc(ref, {
                    question: document.getElementById(`q-${id}`).value,
                    "options.A": document.getElementById(`a-${id}`).value,
                    "options.B": document.getElementById(`b-${id}`).value,
                    "options.C": document.getElementById(`c-${id}`).value,
                    "options.D": document.getElementById(`d-${id}`).value,
                    correctAnswer: document.getElementById(`cor-${id}`).value
                });
                showToast("Yangilandi!");
            } catch (e) { showToast("Xatolik!"); }
        };

        window.deleteQuiz = async (id) => {
            if(confirm("Haqiqatan ham o'chirmoqchimisiz?")) {
                await deleteDoc(doc(db, "quizzes", id));
                showToast("O'chirildi!");
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        loadQuizzes();
    </script>
</body>
</html>
