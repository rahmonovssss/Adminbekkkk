<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Quiz - Dr. Rahmonov</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f2027; color: white; padding: 15px; }

        /* --- XUSH KELIBSIZ ADMIN QISMI --- */
        .admin-welcome {
            background: linear-gradient(135deg, #ffd700, #ffb900);
            padding: 25px; border-radius: 20px; color: #000;
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .admin-welcome h1 { font-size: 22px; font-weight: 600; }
        .admin-welcome p { font-size: 13px; opacity: 0.8; }

        .section-title { color: #ffd700; font-size: 15px; margin: 20px 0 10px; font-weight: 600; }

        /* --- VIZUAL TUGMALAR --- */
        .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .btn-choice {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px; border-radius: 12px; text-align: center; cursor: pointer; 
            transition: 0.3s; font-size: 13px;
        }
        .btn-choice.active { 
            background: rgba(255, 215, 0, 0.15); border-color: #ffd700; color: #ffd700; font-weight: 600;
        }

        /* --- TEST KARTALARI --- */
        #quiz-list { margin-top: 20px; }
        .quiz-card { 
            background: #1a2a33; padding: 18px; border-radius: 15px; 
            margin-bottom: 15px; border-left: 5px solid #ffd700; 
        }
        .edit-input { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px; border-radius: 10px; margin-top: 8px;
        }
        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-save { flex: 2; background: #00d2ff; color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-del { flex: 1; background: #ff4b2b; color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; }

        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #ffd700; color: #000; padding: 12px 25px; border-radius: 50px;
            transition: 0.5s; z-index: 3000; font-weight: bold;
        }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div class="admin-welcome">
        <h1>Xush kelibsiz, Admin!</h1>
        <p>Testlar bazasini shu yerdan boshqaring</p>
    </div>

    <div class="section-title">Test turi:</div>
    <div class="filter-grid">
        <div class="btn-choice active" id="type-free" onclick="updateType('free')">🎁 Bepul</div>
        <div class="btn-choice" id="type-premium" onclick="updateType('premium')">💎 Premium</div>
    </div>

    <div class="section-title">Fanni tanlang:</div>
    <div class="filter-grid" id="subject-btns">
        </div>

    <h3 id="list-status" style="color: #ffd700; margin: 20px 0 10px; font-size: 16px;">Yuklanmoqda...</h3>

    <div id="quiz-list"></div>

    <div id="toast">Tayyor!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2G8cD0JezEKXRCtKLYiZL0bzDyTp06Vs",
            authDomain: "quiz-app-3692d.firebaseapp.com",
            projectId: "quiz-app-3692d",
            storageBucket: "quiz-app-3692d.firebasestorage.app",
            messagingSenderId: "526836020845",
            appId: "1:526836020845:android:3ea991380c104c75e8b164"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let curType = 'free';
        let curSub = 'Matematika';
        let unsub = null;

        const fanlar = ["Matematika", "Ona tili", "Tarix", "Kimyo", "Biologiya", "Ingiliz tili", "Huquq", "Geografiya"];

        // Fan tugmalarini yaratish
        const btnBox = document.getElementById('subject-btns');
        fanlar.forEach(f => {
            const d = document.createElement('div');
            d.className = `btn-choice ${f === 'Matematika' ? 'active' : ''}`;
            d.id = `f-${f}`; d.innerText = f;
            d.onclick = () => updateSub(f);
            btnBox.appendChild(d);
        });

        window.updateType = (t) => {
            curType = t;
            document.getElementById('type-free').classList.toggle('active', t === 'free');
            document.getElementById('type-premium').classList.toggle('active', t === 'premium');
            loadQuizzes();
        };

        window.updateSub = (s) => {
            curSub = s;
            document.querySelectorAll('#subject-btns .btn-choice').forEach(b => b.classList.remove('active'));
            document.getElementById(`f-${s}`).classList.add('active');
            loadQuizzes();
        };

        window.loadQuizzes = () => {
            if(unsub) unsub();
            const list = document.getElementById('quiz-list');
            const status = document.getElementById('list-status');

            const q = query(collection(db, "quizzes"), where("type", "==", curType), where("subject", "==", curSub));

            unsub = onSnapshot(q, (snap) => {
                list.innerHTML = "";
                status.innerText = `${curSub} (${snap.size} ta test)`;
                if(snap.empty) { list.innerHTML = "<p style='text-align:center; opacity:0.5;'>Hali test yo'q.</p>"; return; }

                snap.forEach(qDoc => {
                    const data = qDoc.data();
                    const div = document.createElement('div');
                    div.className = "quiz-card";
                    div.innerHTML = `
                        <textarea class="edit-input" id="q-${qDoc.id}" rows="2">${data.question}</textarea>
                        <div class="grid-options">
                            <input class="edit-input" id="a-${qDoc.id}" value="${data.options.A}">
                            <input class="edit-input" id="b-${qDoc.id}" value="${data.options.B}">
                            <input class="edit-input" id="c-${qDoc.id}" value="${data.options.C}">
                            <input class="edit-input" id="d-${qDoc.id}" value="${data.options.D}">
                        </div>
                        <p style="font-size:12px;">To'g'ri: <input id="cor-${qDoc.id}" value="${data.correctAnswer}" style="width:30px; background:none; border:1px solid #555; color:yellow; text-align:center;"></p>
                        <div class="action-btns">
                            <button class="btn-save" onclick="updateQuiz('${qDoc.id}')">SAQLASH</button>
                            <button class="btn-del" onclick="deleteQuiz('${qDoc.id}')">O'CHIRISH</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        };

        window.updateQuiz = async (id) => {
            await updateDoc(doc(db, "quizzes", id), {
                question: document.getElementById(`q-${id}`).value,
                "options.A": document.getElementById(`a-${id}`).value,
                "options.B": document.getElementById(`b-${id}`).value,
                "options.C": document.getElementById(`c-${id}`).value,
                "options.D": document.getElementById(`d-${id}`).value,
                correctAnswer: document.getElementById(`cor-${id}`).value.toUpperCase()
            });
            showToast("Saqlandi!");
        };

        window.deleteQuiz = async (id) => {
            if(confirm("O'chirilsinmi?")) { await deleteDoc(doc(db, "quizzes", id)); showToast("O'chirildi!"); }
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        loadQuizzes();
    </script>
</body>
</html>
